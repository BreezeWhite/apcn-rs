name: Release

on:
  push:
    branches:
      - ci

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev libmpc-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: publish-crates

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Only publish if the version doesn't exist on crates.io yet
          cargo publish --no-verify || echo "Cargo publish failed (likely version already published), continuing..."

  build-binaries:
    name: Build Binary (${{ matrix.os }} - ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        backend: [rug, dashu]
        include:
          - os: ubuntu-latest
            platform_name: linux-x86_64
            archive_ext: tar.gz
            binary_name: apcn
          - os: macos-latest
            platform_name: macos-aarch64
            archive_ext: tar.gz
            binary_name: apcn
          - os: windows-latest
            platform_name: windows-x86_64
            archive_ext: zip
            binary_name: apcn.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust GNU Toolchain (Windows Rug)
        if: matrix.os == 'windows-latest' && matrix.backend == 'rug'
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          rustup default stable-x86_64-pc-windows-gnu

      - name: Install MSYS2 Dependencies (Windows Rug)
        if: matrix.os == 'windows-latest' && matrix.backend == 'rug'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-clang
            m4
            make
            diffutils
          path-type: inherit

      - name: Install system dependencies (Linux Rug)
        if: matrix.os == 'ubuntu-latest' && matrix.backend == 'rug'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev libmpc-dev

      - name: Install system dependencies (macOS Rug)
        if: matrix.os == 'macos-latest' && matrix.backend == 'rug'
        run: |
          brew install gmp mpfr mpc

      - name: Install Rust toolchain (Standard)
        if: matrix.os != 'windows-latest' || matrix.backend != 'rug'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.backend }}

      - name: Build binary (dashu backend)
        if: matrix.backend == 'dashu'
        shell: bash
        run: cargo build --release --no-default-features --features cli,dashu

      - name: Build binary (rug backend - Unix)
        if: matrix.backend == 'rug' && matrix.os != 'windows-latest'
        shell: bash
        run: cargo build --release

      - name: Build binary (rug backend - Windows)
        if: matrix.backend == 'rug' && matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          echo "=== Debugging: Locating m4.exe ==="
          find /c/msys64 -name "m4.exe" 2>/dev/null || true
          find /usr/bin -name "m4.exe" 2>/dev/null || true
          
          export PATH="/c/msys64/usr/bin:$PATH"
          CC=clang cargo build --release

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/release
          tar -czvf ../../apcn-${{ matrix.backend }}-${{ matrix.platform_name }}.${{ matrix.archive_ext }} ${{ matrix.binary_name }}
          cd ../..

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target\release\${{ matrix.binary_name }} -DestinationPath apcn-${{ matrix.backend }}-${{ matrix.platform_name }}.${{ matrix.archive_ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apcn-${{ matrix.backend }}-${{ matrix.platform_name }}
          path: apcn-${{ matrix.backend }}-${{ matrix.platform_name }}.${{ matrix.archive_ext }}

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.get_version.outputs.VERSION }}
      tag_name: ${{ steps.get_version.outputs.TAG }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version and generate tag
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n1 | cut -d'"' -f2)
          TAG="v${VERSION}-pre.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.TAG }}
          name: Release ${{ steps.get_version.outputs.TAG }} (Pre-release Test)
          body: |
            Pre-release test build of `apcn` version ${{ steps.get_version.outputs.VERSION }}.
            
            ### Binaries (Rug Backend):
            - **Linux**: `apcn-rug-linux-x86_64.tar.gz` (features: cli, rug)
            - **macOS**: `apcn-rug-macos-aarch64.tar.gz` (features: cli, rug)
            - **Windows**: `apcn-rug-windows-x86_64.zip` (compiled via GNU target; features: cli, rug)
            
            ### Binaries (Dashu Backend):
            - **Linux**: `apcn-dashu-linux-x86_64.tar.gz` (features: cli, dashu)
            - **macOS**: `apcn-dashu-macos-aarch64.tar.gz` (features: cli, dashu)
            - **Windows**: `apcn-dashu-windows-x86_64.zip` (compiled via MSVC target; features: cli, dashu)
            
            Triggered by commit ${{ github.sha }} on branch `ci`.
          draft: false
          prerelease: true
          files: |
            artifacts/apcn-rug-linux-x86_64.tar.gz
            artifacts/apcn-dashu-linux-x86_64.tar.gz
            artifacts/apcn-rug-macos-aarch64.tar.gz
            artifacts/apcn-dashu-macos-aarch64.tar.gz
            artifacts/apcn-rug-windows-x86_64.zip
            artifacts/apcn-dashu-windows-x86_64.zip

  deploy-pages:
    name: Deploy Page & Report to GitHub Pages
    needs: create-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages directory
        shell: bash
        run: |
          mkdir -p public
          
          # Copy our beautiful benchmark report to index.html so it serves as the home page of Pages
          if [ -f benchmark_report.html ]; then
            cp benchmark_report.html public/index.html
          else
            # Fallback if the report doesn't exist in the commit
            echo "<html><body><h1>apcn Releases</h1><p>Visit <a href='https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.tag_name }}'>Releases</a> to download binaries.</p></body></html>" > public/index.html
          fi
          
          # Inject direct links to the built release binaries at the bottom of the page
          if [ -f public/index.html ]; then
            DOWNLOAD_HTML="<div class='dashboard-card' style='margin-top: 2rem;'><div class='card-header-row'><div class='card-title-container'><div class='card-title-icon'><i data-lucide='download'></i></div><h2>Download Pre-Release Binaries</h2></div></div><p style='color: var(--text-secondary); margin-bottom: 1.5rem;'>Download pre-compiled binaries for the latest test release (<code>${{ needs.create-release.outputs.tag_name }}</code>):</p><div style='display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: 1rem;'><div class='detail-mini-card'><div class='detail-mini-label' style='color: var(--accent-cyan);'><i data-lucide='linux' style='width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;'></i> Linux (x86_64)</div><div style='display: flex; gap: 0.5rem; margin-top: 0.5rem;'><a href='https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.tag_name }}/apcn-rug-linux-x86_64.tar.gz' class='size-btn active' style='text-decoration: none; padding: 0.3rem 0.6rem; font-size: 0.75rem; flex: 1; text-align: center;'>rug backend</a><a href='https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.tag_name }}/apcn-dashu-linux-x86_64.tar.gz' class='size-btn' style='text-decoration: none; padding: 0.3rem 0.6rem; font-size: 0.75rem; flex: 1; text-align: center;'>dashu backend</a></div></div><div class='detail-mini-card'><div class='detail-mini-label' style='color: var(--accent-purple);'><i data-lucide='apple' style='width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;'></i> macOS (Apple Silicon)</div><div style='display: flex; gap: 0.5rem; margin-top: 0.5rem;'><a href='https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.tag_name }}/apcn-rug-macos-aarch64.tar.gz' class='size-btn active' style='text-decoration: none; padding: 0.3rem 0.6rem; font-size: 0.75rem; flex: 1; text-align: center;'>rug backend</a><a href='https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.tag_name }}/apcn-dashu-macos-aarch64.tar.gz' class='size-btn' style='text-decoration: none; padding: 0.3rem 0.6rem; font-size: 0.75rem; flex: 1; text-align: center;'>dashu backend</a></div></div><div class='detail-mini-card'><div class='detail-mini-label' style='color: var(--accent-amber);'><i data-lucide='monitor' style='width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;'></i> Windows (x86_64)</div><div style='display: flex; gap: 0.5rem; margin-top: 0.5rem;'><a href='https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.tag_name }}/apcn-rug-windows-x86_64.zip' class='size-btn active' style='text-decoration: none; padding: 0.3rem 0.6rem; font-size: 0.75rem; flex: 1; text-align: center;'>rug backend</a><a href='https://github.com/${{ github.repository }}/releases/download/${{ needs.create-release.outputs.tag_name }}/apcn-dashu-windows-x86_64.zip' class='size-btn' style='text-decoration: none; padding: 0.3rem 0.6rem; font-size: 0.75rem; flex: 1; text-align: center;'>dashu backend</a></div></div></div></div>"
            
            # Inject just before the closing body tag of index.html
            sed -i "s|</body>|$DOWNLOAD_HTML</body>|g" public/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
